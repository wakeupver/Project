name: Publish

on:
  push:
    tags:
      - "*"

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from base64 secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFreeRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemuroid-release-apk
          path: lemuroid-app/build/outputs/apk/free/release/lemuroid-app-free-release.apk
          retention-days: 7

  publish_release:
    name: Publish Release on GitHub
    needs: [ build ]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: lemuroid-release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          files: lemuroid-app-free-release.apk
